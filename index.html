<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>โปรไฟล์นักศึกษา - วัชรเกียรติ สนธิเดชกุล</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, 'Helvetica Neue', Arial, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .profile-card {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
            text-align: center;
            padding: 30px;
            border-top: 8px solid #0056b3;
        }

        .profile-img-container {
            width: 150px;
            height: 150px;
            margin: 0 auto 20px;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid #eef2f3;
            background-color: #ddd;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* แสดงเมื่อยังไม่ได้ใส่ไฟล์รูปภาพ */
        .profile-img-placeholder {
            color: #888;
            font-size: 14px;
        }

        .profile-name {
            font-size: 24px;
            color: #333;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .student-id {
            font-size: 16px;
            color: #0056b3;
            font-weight: bold;
            margin-bottom: 20px;
            background: #e6f0fa;
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
        }

        .info-section {
            text-align: left;
            margin-top: 25px;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }

        .info-item {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        .info-label {
            font-size: 12px;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 2px;
            font-weight: bold;
        }

        .info-value {
            font-size: 16px;
            color: #444;
        }

        .info-value a {
            color: #0056b3;
            text-decoration: none;
        }

        .info-value a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <div class="profile-img-container">
            <img src="https://cdn.discordapp.com/attachments/1220102825405583525/1517031890144465067/IMG_20260618_120239.jpg?ex=6a34cd8b&is=6a337c0b&hm=a9f2981a8070d610fa9642a35c8700c4be9b6d718856215bcf854fbf38205d35&" alt="รูปโปรไฟล์ วัชรเกียรติ สนธิเดชกุล" class="profile-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
            <div class="profile-img-placeholder" style="display: none;">[ ใส่รูปโปรไฟล์ตรงนี้ ]</div>
        </div>

        <h1 class="profile-name">วัชรเกียรติ สนธิเดชกุล</h1>
        <div class="student-id">รหัสนักศึกษา: 694245010</div>

        <div class="info-section">
            <div class="info-item">
                <span class="info-label">สาขาวิชา</span>
                <span class="info-value">วิทยาการคอมพิวเตอร์</span>
            </div>
            <div class="info-item">
                <span class="info-label">คณะ</span>
                <span class="info-value">คณะวิทยาศาสตร์และเทคโนโลยี</span>
            </div>
            <div class="info-item">
                <span class="info-label">มหาวิทยาลัย</span>
                <span class="info-value">มหาวิทยาลัยราชภัฏหมู่บ้านจอมบึง</span>
            </div>
            <div class="info-item">
                <span class="info-label">เบอร์โทรศัพท์</span>
                <span class="info-value"><a href="tel:0942575964">094-2575964</a></span>
            </div>
            <div class="info-item">
                <span class="info-label">อีเมล</span>
                <span class="info-value"><a href="mailto:694245010@mcru.ac.th">694245010@mcru.ac.th</a></span>
            </div>
        </div>
    </div>

</body>
</html>
